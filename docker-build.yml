name:BuildDockerImage

on:
push:
branches: [ &quot;main&quot; ] # Trigger when code is pushed to main branch

jobs:
build:
runs-on:ubuntu-latest

steps:
-name:Checkoutcode
uses:actions/checkout@v4

-name:SetupDockerBuildx
uses:docker/setup-buildx-action@v3

-name:BuildDockerimage
run:dockerbuild-tmyapp:latest.

⚙️(Optional) Step 5: Push Image to Docker Hub
If you want to push the image to Docker Hub, update your workflow:
name:BuildandPushDockerImage

on:

push:
branches: [ &quot;main&quot; ]

jobs:
build:
runs-on:ubuntu-latest

steps:
-name:Checkoutcode
uses:actions/checkout@v4

-name:LogintoDockerHub
uses:docker/login-action@v3
with:
username:${{secrets.DOCKERHUB_USERNAME}}
password:${{secrets.DOCKERHUB_TOKEN}}

-name:BuildandPushDockerimage
uses:docker/build-push-action@v5
with:
push:true
tags:${{secrets.DOCKERHUB_USERNAME}}/myapp:latest
